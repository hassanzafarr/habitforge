name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: habitforge/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: habitforge/backend
        run: python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: habitforge/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: habitforge/frontend
        run: npx playwright install --with-deps chromium

      - name: Backend tests
        working-directory: habitforge/backend
        run: python -m pytest tests -v --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Frontend typecheck
        working-directory: habitforge/frontend
        run: npm run typecheck

      - name: Frontend unit coverage
        working-directory: habitforge/frontend
        run: npm run test:coverage

      - name: Frontend build
        working-directory: habitforge/frontend
        run: npm run build

      - name: Playwright E2E
        working-directory: habitforge/frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: habitforge/frontend/playwright-report/
          if-no-files-found: ignore
